name: "CI/CD Security & Syntax Pipeline"

# Run this workflow every time code is pushed to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── 1. PHP Syntax Checker ─────────────────────────────────────
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # You can change this to match the UCY server version

      - name: Run PHP Syntax Linter
        run: |
          find . -name "*.php" -print0 | xargs -0 -n1 php -l

  # ── 2. GitHub CodeQL Security Scanner ────────────────────────
  security-scan:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: php-lint # Only run security scan if PHP syntax is valid
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript # Scans your JS for XSS, injection, and logic flaws

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"