name: "CI/CD 3-Stage Pipeline"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Prevents multiple redundant builds from running at the same time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # STAGE 1: BUILD & UNIT TEST
  stage-1-build-and-test:
    name: "Stage 1: Build & Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, pdo_mysql
          
      - name: Validate Project Structure
        run: |
          # Flexible check for index file
          [[ -f "index.php" || -f "index.html" ]] || (echo "❌ Missing entry point!"; exit 1)
          [[ -f "php/weather.php" ]] || (echo "❌ Missing backend!"; exit 1)
          echo "✅ Project structure is valid."

  # STAGE 2: CODE QUALITY & SECRET SCAN
  stage-2-code-quality:
    name: "Stage 2: Quality & Security"
    runs-on: ubuntu-latest
    needs: stage-1-build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Secret Detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: PHP Syntax Linter
        run: find . -name "*.php" -print0 | xargs -0 -n1 php -l

  # STAGE 3: PACKAGE & SECURITY
  stage-3-package-and-security:
    name: "Stage 3: Docker & Anchore"
    runs-on: ubuntu-latest
    needs: stage-2-code-quality
    permissions:
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Anchore Vulnerability Scanner
        uses: anchore/scan-action@v3
        with:
          path: "."
          fail-build: false
          severity-cutoff: "high"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (with Caching)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: weather-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max