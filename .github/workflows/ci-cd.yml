name: "CI/CD 3-Stage Pipeline"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ════════════════════════════════════════════════════════════
  # STAGE 1: BUILD & UNIT TEST
  # Goal: Does the code work? (File structure & logic checks)
  # ════════════════════════════════════════════════════════════
  stage-1-build-and-test:
    name: "Stage 1: Build & Unit Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          
      - name: Validate Project Structure (Build)
        run: |
          echo "Checking if critical files exist..."
          
          # Print the entire folder structure for debugging
          echo "--- DIRECTORY STRUCTURE ---"
          ls -R
          echo "---------------------------"

          # Check files one by one and give clear error messages
          if [ ! -f "index.html" ]; then echo "❌ index.html not found in root!"; exit 1; fi
          if [ ! -f "php/weather.php" ]; then echo "❌ php/weather.php not found!"; exit 1; fi
          
          # Check both possible JS paths
          if [ -f "src/js/main.js" ]; then 
            echo "✅ src/js/main.js found!"
          elif [ -f "js/main.js" ]; then
            echo "✅ js/main.js found!"
          else 
            echo "❌ main.js not found in src/js/ or js/!"; exit 1; 
          fi

          echo "✅ All critical files found! Build validation passed!"

      - name: Run Unit Tests
        run: |
          echo "Currently no unit tests (like PHPUnit or Jest) are configured."
          echo "Pipeline is ready for tests to be added here in the future!"
          # Example future command: vendor/bin/phpunit tests/

  # ════════════════════════════════════════════════════════════
  # STAGE 2: CODE QUALITY
  # Goal: Is the code clean? (Syntax Linting)
  # ════════════════════════════════════════════════════════════
  stage-2-code-quality:
    name: "Stage 2: Code Quality"
    runs-on: ubuntu-latest
    needs: stage-1-build-and-test # Waits for Stage 1 to pass
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP Syntax Linter
        run: |
          echo "Scanning all PHP files for syntax errors..."
          find . -name "*.php" -print0 | xargs -0 -n1 php -l

  # ════════════════════════════════════════════════════════════
  # STAGE 3: PACKAGE & SECURITY
  # Goal: Is it safe? (Vulnerability Scan & Docker Packaging)
  # ════════════════════════════════════════════════════════════
  stage-3-package-and-security:
    name: "Stage 3: Package & Security"
    runs-on: ubuntu-latest
    needs: stage-2-code-quality # Waits for Stage 2 to pass
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- SECURITY SCANNING ---
      - name: Initialize CodeQL Security Scanner
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      # --- DOCKER PACKAGING ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Set to true later if you want to push to DockerHub
          tags: weather-dashboard:latest